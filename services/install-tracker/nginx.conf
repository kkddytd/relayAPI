upstream kk_web {
    server 127.0.0.1:6722;
    keepalive 16;
}

upstream kangkang_install_tracker {
    server 127.0.0.1:6723;
    keepalive 16;
}

real_ip_header CF-Connecting-IP;
real_ip_recursive on;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name claude-ai.zmkk.edu.kg 34.207.137.146 _;

    ssl_certificate /etc/ssl/kangkang-install-tracker/server.crt;
    ssl_certificate_key /etc/ssl/kangkang-install-tracker/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:KangkangInstallTrackerSSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 0;

    location / {
        proxy_pass http://kangkang_install_tracker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}

server {
    listen 2053 ssl;
    listen [::]:2053 ssl;
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name claude-ai.zmkk.edu.kg 34.207.137.146;

    ssl_certificate /etc/ssl/kangkang-install-tracker/server.crt;
    ssl_certificate_key /etc/ssl/kangkang-install-tracker/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:KangkangInstallTrackerSSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 0;

    location ^~ /api/v1/installations/ {
        proxy_pass http://kangkang_install_tracker;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location = /api/v1 {
        proxy_pass http://kk_web;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }

    location ^~ /api/v1/ {
        proxy_pass http://kk_web;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }

    location / {
        proxy_pass http://kk_web;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Kangkang-Trusted-Web "kk-public-web-via-loopback";
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 5m;
        proxy_send_timeout 5m;
    }
}
